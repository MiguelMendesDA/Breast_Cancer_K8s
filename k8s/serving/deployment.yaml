apiVersion: apps/v1
kind: Deployment
metadata:
  name: breast-cancer-serving
  namespace: breast-cancer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: breast-cancer-serving
  template:
    metadata:
      labels:
        app: breast-cancer-serving
    spec:
      containers:
        - name: serving
          image: miguelmendesds/breast-cancer-serving:IMAGE_TAG
          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: mysql-secrets

          volumeMounts:
            - name: model-storage
              mountPath: /app/models

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-pvc