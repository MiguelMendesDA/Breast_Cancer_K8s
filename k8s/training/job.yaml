apiVersion: batch/v1
kind: Job
metadata:
  name: breast-cancer-training
  namespace: breast-cancer
spec:
  backoffLimit: 2
  template:
    metadata: {}
    spec:
      restartPolicy: Never

      # Init container para esperar o MySQL
      initContainers:
        - name: wait-for-db
          image: busybox
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL to be ready..."
              while ! nc -z db-service 3306; do
                echo "MySQL is not ready yet. Sleeping 2s..."
                sleep 2
              done
              echo "MySQL is ready!"

      containers:
        - name: training
          image: breast-cancer-train:1.0
          imagePullPolicy: Never
          envFrom:
              - configMapRef:
                  name: app-config
              - secretRef:
                  name: mysql-secrets

          volumeMounts:
            - name: model-storage
              mountPath: /app/models

      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-pvc
