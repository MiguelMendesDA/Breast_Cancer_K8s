apiVersion: batch/v1
kind: CronJob
metadata:
  name: breast-cancer-retrain
  namespace: breast-cancer
spec:
  schedule: "00 13 * * *" 
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            job-name: breast-cancer-retrain
        spec:
          restartPolicy: OnFailure
          containers:
            - name: training
              image: miguelmendesds/breast-cancer-train:IMAGE_TAG
              imagePullPolicy: Always
              envFrom:
                - configMapRef:
                    name: app-config
                - secretRef:
                    name: mysql-secrets
              volumeMounts:
                - name: model-storage
                  mountPath: /app/models
          volumes:
            - name: model-storage
              persistentVolumeClaim:
                claimName: model-pvc