apiVersion: batch/v1
kind: Job
metadata:
  name: breast-cancer-training
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure

      initContainers:
        - name: wait-for-db
          image: busybox
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL to be ready..."
              while ! nc -z $MYSQL_HOST $MYSQL_PORT; do
                echo "MySQL is not ready yet. Sleeping 2s..."
                sleep 2
              done
              echo "MySQL is ready!"
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.secretName }}
            - configMapRef:
                name: app-config

      containers:
        - name: training
          image: {{ .Values.image.training }}
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.secretName }}
            - configMapRef:
                name: app-config
          volumeMounts:
            - name: model-storage
              mountPath: /app/models

      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-pvc