apiVersion: batch/v1
kind: Job
metadata:
  name: breast-cancer-training
  namespace: {{ .Release.Namespace }}
spec:
  backoffLimit: 2
  template:
    metadata: {}
    spec:
      restartPolicy: OnFailure

      initContainers:
        - name: wait-for-db
          image: busybox
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL to be ready..."
              while ! nc -z $MYSQL_HOST $MYSQL_PORT; do
                echo "MySQL is not ready yet. Sleeping 2s..."
                sleep 2
              done
              echo "MySQL is ready!"
          env:
            - name: MYSQL_HOST
              value: {{ .Values.config.mysqlHost }}
            - name: MYSQL_PORT
              value: "{{ .Values.config.mysqlPort }}"
            - name: MYSQL_DB
              value: {{ .Values.config.mysqlDb }}
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.secretName }}
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.secretName }}
                  key: MYSQL_PASSWORD

      containers:
        - name: training
          image: {{ .Values.image.training }}
          imagePullPolicy: Always
          env:
            - name: MYSQL_HOST
              value: {{ .Values.config.mysqlHost }}
            - name: MYSQL_PORT
              value: "{{ .Values.config.mysqlPort }}"
            - name: MYSQL_DB
              value: {{ .Values.config.mysqlDb }}
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.secretName }}
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.secretName }}
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: model-storage
              mountPath: /app/models

      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-pvc