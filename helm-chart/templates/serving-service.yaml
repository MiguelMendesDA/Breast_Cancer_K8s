apiVersion: v1
kind: Service
metadata:
  name: serving-service
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.serving.service.type | default "ClusterIP" }}
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - protocol: TCP
      port: {{ .Values.serving.service.port | default 80 }}
      targetPort: {{ .Values.serving.service.targetPort | default 8000 }}