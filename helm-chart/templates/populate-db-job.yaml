apiVersion: batch/v1
kind: Job
metadata:
  name: populate-training-db
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-db
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL to be ready..."
              while ! nc -z $MYSQL_HOST $MYSQL_PORT; do
                echo "MySQL is not ready. Sleeping 2s..."
                sleep 2
              done
              echo "MySQL is ready!"
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.secretName }}
            - configMapRef:
                name: app-config
      containers:
        - name: populate-db
          image: {{ .Values.image.populateDB }}
          imagePullPolicy: Always
          command: ["python", "populate-db.py"]
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.secretName }}
            - configMapRef:
                name: app-config