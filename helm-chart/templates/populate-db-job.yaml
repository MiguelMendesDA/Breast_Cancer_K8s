apiVersion: batch/v1
kind: Job
metadata:
  name: populate-training-db
  namespace: {{ .Release.Namespace }}
spec:
  backoffLimit: 2
  template:
    metadata: {}
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-db
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL to be ready..."
              while ! nc -z {{ .Values.config.mysqlHost }} {{ .Values.config.mysqlPort }}; do
                echo "MySQL is not ready. Sleeping 2s..."
                sleep 2
              done
              echo "MySQL is ready!"
          env:
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.secretName }}
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.secretName }}
                  key: MYSQL_PASSWORD
      containers:
        - name: populate-db
          image: {{ .Values.image.populateDB }}
          imagePullPolicy: Always
          command: ["python", "populate-db.py"]
          env:
            - name: MYSQL_HOST
              value: {{ .Values.config.mysqlHost }}
            - name: MYSQL_PORT
              value: "{{ .Values.config.mysqlPort }}"
            - name: MYSQL_DB
              value: {{ .Values.config.mysqlDb }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.secretName }}