apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-initdb-config
  namespace: {{ .Release.Namespace }}
data:
  init.sql: |
    -- =========================
    -- Database
    -- =========================
    CREATE DATABASE IF NOT EXISTS breast_cancer;
    USE breast_cancer;

    -- =========================
    -- Training data
    -- =========================
    CREATE TABLE training_data (
        id INT AUTO_INCREMENT PRIMARY KEY,

        age INT,
        gender VARCHAR(10),
        smoking_habits VARCHAR(10),
        alcohol_habits VARCHAR(10),

        weight FLOAT,
        height FLOAT,
        bmi FLOAT,

        breastfeeding VARCHAR(10),
        oral_contraception VARCHAR(10),

        breast_cancer_history VARCHAR(10)
    );

    -- =========================
    -- Predictions made by the API
    -- =========================
    CREATE TABLE predictions (
        id INT AUTO_INCREMENT PRIMARY KEY,

        age INT,
        gender VARCHAR(10),
        smoking_habits VARCHAR(10),
        alcohol_habits VARCHAR(10),

        weight FLOAT,
        height FLOAT,
        bmi FLOAT,

        breastfeeding VARCHAR(10),
        oral_contraception VARCHAR(10),

        prediction VARCHAR(10),
        real_value VARCHAR(10),

        model_version VARCHAR(50),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    -- =========================
    -- Trained models metadata
    -- =========================
    CREATE TABLE models (
        id INT AUTO_INCREMENT PRIMARY KEY,

        model_version VARCHAR(50),
        trained_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        accuracy FLOAT
    );