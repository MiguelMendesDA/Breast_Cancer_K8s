name: Build, Push Docker Images and Deploy Helm

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set Image Tag
        id: tag
        run: echo "image_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Populate-DB Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/breast-cancer-populate-db:${{ steps.tag.outputs.image_tag }} ./populate-db
          docker push ${{ secrets.DOCKER_USERNAME }}/breast-cancer-populate-db:${{ steps.tag.outputs.image_tag }}

      - name: Build and Push Training Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/breast-cancer-train:${{ steps.tag.outputs.image_tag }} ./training
          docker push ${{ secrets.DOCKER_USERNAME }}/breast-cancer-train:${{ steps.tag.outputs.image_tag }}

      - name: Build and Push Serving Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/breast-cancer-serving:${{ steps.tag.outputs.image_tag }} ./api
          docker push ${{ secrets.DOCKER_USERNAME }}/breast-cancer-serving:${{ steps.tag.outputs.image_tag }}

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Deploy Helm Chart
        run: |
          helm upgrade breast-cancer ./helm-chart \
            --namespace breast-cancer \
            --create-namespace \
            --set config.mysqlHost=db-service \
            --set config.mysqlPort="3306" \
            --set config.mysqlDb=breast_cancer \
            --set secrets.mysqlUser=${{ secrets.MYSQL_USER }} \
            --set secrets.mysqlPassword=${{ secrets.MYSQL_PASSWORD }} \
            --set image.populateDB=${{ secrets.DOCKER_USERNAME }}/breast-cancer-populate-db:${{ steps.tag.outputs.image_tag }} \
            --set image.training=${{ secrets.DOCKER_USERNAME }}/breast-cancer-train:${{ steps.tag.outputs.image_tag }} \
            --set image.serving=${{ secrets.DOCKER_USERNAME }}/breast-cancer-serving:${{ steps.tag.outputs.image_tag }}