name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Image Tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and Push Populate-DB Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/breast-cancer-populate-db:${IMAGE_TAG} ./populate-db
          docker push ${{ secrets.DOCKER_USERNAME }}/breast-cancer-populate-db:${IMAGE_TAG}

      - name: Build and Push Training Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/breast-cancer-train:${IMAGE_TAG} ./training
          docker push ${{ secrets.DOCKER_USERNAME }}/breast-cancer-train:${IMAGE_TAG}

      - name: Build and Push Serving Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/breast-cancer-serving:${IMAGE_TAG} ./api
          docker push ${{ secrets.DOCKER_USERNAME }}/breast-cancer-serving:${IMAGE_TAG}